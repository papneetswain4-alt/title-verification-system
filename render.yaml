  - type: web
    name: nlp-engine
    env: docker
    plan: free
    rootDir: nlp-engine
    envVars:
      - key: PORT
        value: 5000

  - type: web
    name: backend
    env: docker
    plan: free
    rootDir: backend
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: prgi-db
          property: connectionString
      - key: NLP_SERVICE_URL
        value: http://nlp-engine:5000/api/v1/semantic/verify

databases:
  - name: prgi-db
    plan: free
