services:
  - type: web
    name: nlp-engine
    env: docker
    plan: free
    dockerContext: .
    dockerfilePath: docker/Dockerfile.nlp
    envVars:
      - key: PORT
        value: 5000
    rootDir: nlp-engine

  - type: web
    name: backend
    env: docker
    plan: free
    dockerContext: .
    dockerfilePath: docker/Dockerfile.backend
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: prgi-db
          property: connectionString
      - key: NLP_SERVICE_URL
        value: http://nlp-engine:5000/api/v1/semantic/verify
    rootDir: backend

databases:
  - name: prgi-db
    plan: free
